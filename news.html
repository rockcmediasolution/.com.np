<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Media - ROCK-C Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }
        body { background: #0b0b0b; color: #f1f1f1; line-height: 1.6; }
        
        header { background: rgba(0, 0, 0, 0.9); padding: 15px; text-align: center; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { max-width: 180px; width: 100%; height: auto; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .back-btn { background: #252525; padding: 10px 20px; border-radius: 25px; color: #fff; text-decoration: none; font-size: 1rem; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; border: 1px solid #444; }
        .back-btn:hover { background: #ffd700; color: #000; border-color: #ffd700; }
        
        .page-title { color: #ffd700; font-size: 2rem; text-align: center; flex-grow: 1; }
        
        /* दुई भागमा बाँड्ने डिजाइन (Grid Layout) */
        .content-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
        
        .section-title { font-size: 1.4rem; color: #fff; border-bottom: 2px dashed #333; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: #ffd700; }

        /* News Item Design */
        .news-box { background: #141414; padding: 25px; border-radius: 12px; border-left: 4px solid #ffd700; margin-bottom: 20px; border-top: 1px solid #252525; border-right: 1px solid #252525; border-bottom: 1px solid #252525; }
        .news-title { color: #ffd700; font-size: 1.3rem; margin-bottom: 8px; }
        .news-date { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
        .news-content { color: #ccc; white-space: pre-wrap; font-size: 0.95rem; }
        
        /* Facebook Box Design */
        .fb-container { background: #141414; padding: 15px; border-radius: 12px; border: 1px solid #252525; display: flex; justify-content: center; overflow: hidden; }
        
        .loading { text-align: center; padding: 30px; color: #aaa; }

        /* मोबाइलको लागि डिजाइन */
        @media (max-width: 900px) {
            .content-wrapper { grid-template-columns: 1fr; } /* मोबाइलमा तल-माथि आउने */
            .page-title { font-size: 1.5rem; text-align: left; }
            .logo { max-width: 140px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="ROCK C MEDIA SOLUTION NEW LOGO.png" alt="ROCK-C Media Solution" class="logo">
        </a>
    </header>

    <div class="container">
        <div class="header-section">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <h1 class="page-title">News & Media Center</h1>
            <div style="width: 120px;"></div> </div>
        
        <div class="content-wrapper">
            
            <div class="left-news">
                <h2 class="section-title"><i class="fa-solid fa-newspaper"></i> Latest Updates</h2>
                <div id="news-container">
                    <p class="loading"><i class="fas fa-spinner fa-spin"></i> Loading latest updates...</p>
                </div>
            </div>

            <div class="right-facebook">
                <h2 class="section-title"><i class="fa-brands fa-facebook"></i> Facebook Live Feed</h2>
                <div class="fb-container">
                    <div class="fb-page" 
                         data-href="https://www.facebook.com/Rockcmedia" 
                         data-tabs="timeline" 
                         data-width="500" 
                         data-height="600" 
                         data-small-header="false" 
                         data-adapt-container-width="true" 
                         data-hide-cover="false" 
                         data-show-facepile="false">
                        <blockquote lang="en" class="fb-xfbml-parse-ignore">
                            <a href="https://www.facebook.com/Rockcmedia">Loading Facebook Feed...</a>
                        </blockquote>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/ne_NP/sdk.js#xfbml=1&version=v17.0"></script>

    <script>
        fetch('news.json')
            .then(response => {
                if (!response.ok) throw new Error("news.json not found");
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('news-container');
                if (data.length === 0) {
                    container.innerHTML = '<p class="loading">No news available at the moment.</p>';
                    return;
                }
                
                let html = '';
                data.reverse().forEach(news => {
                    html += `
                        <div class="news-box">
                            <h3 class="news-title">${news.title}</h3>
                            <p class="news-date"><i class="fa-regular fa-calendar"></i> ${news.date}</p>
                            <div class="news-content">${news.content}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            })
            .catch(error => {
                console.error("Error loading news:", error);
                document.getElementById('news-container').innerHTML = '<p style="color:red; text-align:center;">Failed to load updates. Make sure news.json exists.</p>';
            });
    </script>

</body>
</html>
